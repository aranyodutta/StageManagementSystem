<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEMPTASIAN Confidence Monitor</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="confidence">
  <main class="confidence-screen" id="confidenceRoot">
    <header class="confidence-header">
      <h1>TEMPTASIAN &mdash; CONFIDENCE MONITOR</h1>
      <div class="confidence-live" id="confidenceLiveIndicator">
        <span class="live-dot"></span>
        <span>STANDBY</span>
      </div>
    </header>

    <section class="confidence-top-grid">
      <div class="confidence-card">
        <h2>CURRENT TIME</h2>
        <div class="confidence-value" id="confidenceCurrentTime">-</div>
      </div>
      <div class="confidence-card">
        <h2>PROJECTED END</h2>
        <div class="confidence-value" id="confidenceProjectedEnd">-</div>
      </div>
      <div class="confidence-card">
        <h2>OFFSET</h2>
        <div class="confidence-value" id="confidenceOffset">-</div>
      </div>
      <div class="confidence-card">
        <h2>STATUS</h2>
        <div class="confidence-status on-time" id="confidenceStatus">ON TIME</div>
      </div>
    </section>

    <section class="confidence-main-grid">
      <div class="confidence-panel current-panel">
        <div class="confidence-kicker">CURRENT ITEM</div>
        <div class="confidence-title" id="confidenceCurrentTitle">-</div>
        <div class="confidence-metrics">
          <div>
            <h3>ELAPSED</h3>
            <div id="confidenceElapsed">-</div>
          </div>
          <div>
            <h3>OVER / UNDER</h3>
            <div id="confidenceOverUnder">-</div>
          </div>
          <div>
            <h3>ESTIMATED END</h3>
            <div id="confidenceEstimatedEnd">-</div>
          </div>
        </div>
      </div>

      <div class="confidence-panel next-panel">
        <div class="confidence-kicker">NEXT ITEM</div>
        <div class="confidence-title" id="confidenceNextTitle">-</div>
        <div class="confidence-metrics two-up">
          <div>
            <h3>ESTIMATED START</h3>
            <div id="confidenceEstimatedStart">-</div>
          </div>
          <div>
            <h3>COUNTDOWN</h3>
            <div id="confidenceCountdown">-</div>
          </div>
        </div>
      </div>
    </section>

    <section class="confidence-recommendation-row">
      <div>
        <div class="confidence-kicker">INTERMISSION STATUS</div>
        <div class="confidence-recommendation ok" id="confidenceRecommendation">INTERMISSION OK</div>
      </div>
      <div class="confidence-target" id="confidenceTargetEnd">Target end: -</div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
